body{background:#f0f2f5;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:20px}

<script>
// ── CONFIGURATION — update this with your GitHub details ──────────────────────
var GITHUB_USER   = "takala97";       // e.g. "anastakala"
var GITHUB_REPO   = "Yardi";                // your repository name
var GITHUB_BRANCH = "main";
// Template file names exactly as stored in your GitHub repo
var TEMPLATES = {
  vc:  "01-_Business_Process_Requirement_-_Vendor_Cafe.docx.docx",
  p2p: "02-_Business_Process_Requirement_-_Procure_to_Pay.docx.docx",
  fa:  "03-._Business_Process_Requirement_-_FA.docx.docx",
  wo:  "04-._Business_Process_Requirement_-_Work_Orders.docx.docx",
  fm:  "05-_Business_Process_Requirement_-_Inspection_and_PPM.docx.docx",
  rfi: "RFI_Collection_Sheet.xlsx"
};
// ─────────────────────────────────────────────────────────────────────────────

var MODS=[{id:"vc",name:"Vendor Cafe",desc:"Vendor onboarding & portal"},{id:"p2p",name:"Procure to Pay",desc:"PR/PO, invoices, payments"},{id:"fa",name:"Fixed Asset Manager",desc:"Assets & depreciation"},{id:"wo",name:"Work Orders",desc:"FM work orders"},{id:"fm",name:"Inspection & PPM",desc:"Inspections, PPM"}];
var DBS=["Live","Test","UAT","Training","DM Test","CommCafe"];
var STEPS=["Setup","Project & Modules","Cloud Email","BPR Agenda","BPR Documents","RFI Sheet","Review"];
var TN={vc:"Vendor Cafe",p2p:"Procure to Pay",fa:"Fixed Assets",wo:"Work Orders",fm:"Inspection & PPM"};
var M2R={vc:["Vendor Café"],p2p:["P2P","P2P Services"],fa:["Fixed Assets"],wo:["Facility Manager"],fm:["Facility Manager"]};

var step=0,done=new Set(),loading={};
var am=new Set(["vc","p2p","fa","wo","fm"]),adb=new Set(DBS),bt="vc",tr=["",""];
var F={name:"",pin:"",tz:"",sdb:"",lw:"",tw:"",con:"",sm:"Yes",pi:"",to:"Nereah.Abwao@Yardi.Com",cc:"",cn:"",bf:"",bu:"",st:"10:00 AM",sd:"3",fo:"",dl:"",rn:""};

function cl(){return F.name||"[Client]";}
function sm(){return MODS.filter(function(m){return am.has(m.id);});}
function td(){return new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"long",year:"numeric"});}
function tdShort(){return new Date().toLocaleDateString("en-GB");}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function go(n){step=n;re();}
function sf(k,v){F[k]=v;rp();}
function tm(id){if(am.has(id))am.delete(id);else am.add(id);re();}
function tdb(d){if(adb.has(d))adb.delete(d);else adb.add(d);re();}
function at(){tr.push("");re();}
function rt(i){if(tr.length>1){tr.splice(i,1);re();}}
function sbt(id){bt=id;re();}
function rp(){var e=document.getElementById("pill");if(e)e.textContent=F.name?F.name+" — "+sm().length+" modules":"No project loaded";}

function addH(t,h){try{var p=t.match(/(\d+):(\d+)\s*(AM|PM)?/i);if(!p)return t;var hh=parseInt(p[1]),mm=parseInt(p[2]),ap=(p[3]||"").toUpperCase();if(ap==="PM"&&hh!==12)hh+=12;if(ap==="AM"&&hh===12)hh=0;hh+=h;var na=hh>=12?"PM":"AM";if(hh>12)hh-=12;if(hh===0)hh=12;return hh+":"+String(mm).padStart(2,"0")+" "+na;}catch(e){return t;}}

// ── Fetch file from GitHub raw content ────────────────────────────────────────
function githubRawUrl(filename){
  return "https://raw.githubusercontent.com/"+GITHUB_USER+"/"+GITHUB_REPO+"/"+GITHUB_BRANCH+"/templates/"+filename;
}

async function fetchTemplate(filename){
  var url = githubRawUrl(filename);
  var resp = await fetch(url);
  if(!resp.ok) throw new Error("Could not fetch template: "+filename+"\nURL: "+url+"\nStatus: "+resp.status+"\n\nMake sure your GitHub username, repo name, and file names are correct in the config section of this file.");
  return await resp.arrayBuffer();
}

// ── DOCX placeholder replacement using JSZip ──────────────────────────────────
async function processDocx(arrayBuffer, replacements){
  var zip = await JSZip.loadAsync(arrayBuffer);

  // Process document.xml — this is where all the text lives
  var xmlFiles = ["word/document.xml","word/header1.xml","word/footer1.xml","word/header2.xml","word/footer2.xml"];

  for(var i=0; i<xmlFiles.length; i++){
    var fname = xmlFiles[i];
    if(!zip.files[fname]) continue;
    var content = await zip.files[fname].async("string");

    // Replace placeholders
    for(var key in replacements){
      // Handle XX that may be split across XML runs — merge then replace
      content = content.split(key).join(replacements[key]);
    }

    zip.file(fname, content);
  }

  return await zip.generateAsync({type:"arraybuffer", compression:"DEFLATE"});
}

// ── Download a file ───────────────────────────────────────────────────────────
function dlFile(buf, filename, mime){
  var blob = new Blob([buf], {type: mime});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

// ── Generate BPR document from real template ─────────────────────────────────
async function genBpr(id){
  loading["bpr_"+id]=true; re();
  try{
    var c = cl();
    var buf = await fetchTemplate(TEMPLATES[id]);
    var replacements = {
      "XX": c,
      // Version control date/author are also XX in the templates
    };
    // We need smarter replacement for version table
    // The version table has XX in date col and XX in author col
    // We'll handle this by doing a more targeted XML edit
    var processed = await processDocxSmart(buf, c, F.con||"Yardi Consultant", tdShort());
    // processDocxSmart now handles all {{TOKEN}} replacements automatically
    var safe = c.replace(/\s+/g,"_");
    dlFile(processed, "BPR_"+TN[id].replace(/\s+/g,"_")+"_"+safe+".docx", "application/vnd.openxmlformats-officedocument.wordprocessingml.document");
    done.add(4);
  }catch(e){
    alert("Error: "+e.message);
  }
  loading["bpr_"+id]=false; re();
}

// Smart DOCX processor — replaces all {{TOKENS}} in template
async function processDocxSmart(arrayBuffer, clientName, consultant, dateStr){
  var zip = await JSZip.loadAsync(arrayBuffer);
  var tokens = {
    "{{CLIENT_NAME}}":     clientName,
    "{{CONSULTANT_NAME}}": consultant,
    "{{DATE}}":            dateStr,
    "{{CLIENT_PIN}}":      F.pin  || "",
    "{{TIMEZONE}}":        F.tz   || "",
    "{{LIVE_WEBSHARE}}":   F.lw   || "",
    "{{TEST_WEBSHARE}}":   F.tw   || "",
    "{{SERVICE_MANAGER}}": F.sm   || "",
    "{{BPR_FROM}}":        F.bf   || "",
    "{{BPR_UNTIL}}":       F.bu   || "",
  };
  var filesToProcess = ["word/document.xml","word/header1.xml","word/footer1.xml","word/header2.xml","word/footer2.xml"];
  for(var i=0;i<filesToProcess.length;i++){
    var fname=filesToProcess[i];
    if(!zip.files[fname]) continue;
    var xml = await zip.files[fname].async("string");
    for(var token in tokens){
      var safeVal=String(tokens[token]).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      xml = xml.split(token).join(safeVal);
    }
    zip.file(fname, xml);
  }
  return await zip.generateAsync({type:"arraybuffer",compression:"DEFLATE"});
}

// ── Generate Agenda from real BPR template (Vendor Cafe as base) ─────────────
async function genAgenda(){
  loading.agenda=true; re();
  try{
    // Use a clean DOCX approach for agenda — fetch VC template as base structure
    var buf = await fetchTemplate(TEMPLATES.vc);
    var zip = await JSZip.loadAsync(buf);

    // Build agenda XML content and replace document body
    var agendaXml = buildAgendaXml();
    var docXml = await zip.files["word/document.xml"].async("string");

    // Replace body content with agenda
    docXml = docXml.replace(/<w:body>[\s\S]*<\/w:body>/, "<w:body>"+agendaXml+"</w:body>");

    zip.file("word/document.xml", docXml);
    var processed = await zip.generateAsync({type:"arraybuffer", compression:"DEFLATE"});
    var safe = cl().replace(/\s+/g,"_");
    dlFile(processed, "BPR_Agenda_"+safe+".docx", "application/vnd.openxmlformats-officedocument.wordprocessingml.document");
    done.add(3);
  }catch(e){alert("Error: "+e.message);}
  loading.agenda=false; re();
}

function wxText(text, bold, color, size){
  size = size||20;
  var rpr = "<w:rPr>";
  if(bold) rpr += "<w:b/>";
  if(color) rpr += "<w:color w:val=\""+color+"\"/>";
  rpr += "<w:sz w:val=\""+size+"\"/><w:szCs w:val=\""+size+"\"/><w:rFonts w:ascii=\"Arial\" w:hAnsi=\"Arial\"/>";
  rpr += "</w:rPr>";
  return "<w:r>"+rpr+"<w:t xml:space=\"preserve\">"+xmlEsc(text)+"</w:t></w:r>";
}
function xmlEsc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function wxPara(runs, align){
  align = align||"left";
  return "<w:p><w:pPr><w:jc w:val=\""+align+"\"/><w:spacing w:before=\"80\" w:after=\"80\"/></w:pPr>"+runs+"</w:p>";
}
function wxHdrCell(text, width){
  return "<w:tc><w:tcPr><w:tcW w:w=\""+width+"\" w:type=\"dxa\"/><w:shd w:val=\"clear\" w:fill=\"185FA5\"/><w:tcMar><w:top w:w=\"80\" w:type=\"dxa\"/><w:bottom w:w=\"80\" w:type=\"dxa\"/><w:left w:w=\"120\" w:type=\"dxa\"/><w:right w:w=\"120\" w:type=\"dxa\"/></w:tcMar></w:tcPr><w:p><w:pPr><w:jc w:val=\"center\"/></w:pPr>"+wxText(text,true,"FFFFFF",18)+"</w:p></w:tc>";
}
function wxDataCell(text, width, shade){
  shade = shade||"FFFFFF";
  return "<w:tc><w:tcPr><w:tcW w:w=\""+width+"\" w:type=\"dxa\"/><w:shd w:val=\"clear\" w:fill=\""+shade+"\"/><w:tcMar><w:top w:w=\"80\" w:type=\"dxa\"/><w:bottom w:w=\"80\" w:type=\"dxa\"/><w:left w:w=\"120\" w:type=\"dxa\"/><w:right w:w=\"120\" w:type=\"dxa\"/></w:tcMar></w:tcPr><w:p>"+wxText(text,false,"2C2C2A",18)+"</w:p></w:tc>";
}

function buildAgendaXml(){
  var c=cl(), co=F.con||"Yardi Consultant", t=td(), mods=sm();
  var team=tr.filter(Boolean).join(", ")||co;
  var sd=F.bf?new Date(F.bf):null;
  var dn=1;
  function dayL(n){var l="Day "+n;if(sd){var dd=new Date(sd);dd.setDate(dd.getDate()+n-1);l+=" – "+dd.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short",year:"numeric"});}return l;}

  var sessions=[];
  sessions.push({day:dayL(dn++),time:F.st+" – "+addH(F.st,parseInt(F.sd)||3),hrs:F.sd+"h",topics:"Project Kickoff, Scope Walkthrough, Team Introductions, Project Plan Review",att:"All Stakeholders, Project Manager"});
  var ms={vc:[["Vendor Master, Vendor Markets, Categories, Approval DOA, Portal Configurations","Procurement Manager, Finance Team"]],p2p:[["PR/PO Process, GRN, Invoice Management, Approval Workflows","Finance Manager, AP Accountant, Procurement"],["Payment Processing, Petty Cash, Service Contracts, Credit Notes","Finance Manager, AP Accountant"]],fa:[["Asset Groups & Types, Depreciation Methods, Asset Creation Workflows","Finance Manager, FM Manager"]],wo:[["Maintenance Models, WO Lifecycle, Team Structure, WO Statuses & Priorities","FM Manager, CAFM Planner, Supervisors"],["WO Categories, SLA/KPI, Auto Assignment, WO Configuration Points","FM Manager, CAFM Planner"]],fm:[["Inspection Types, Inspection Process, Templates Setup","FM Manager, FM Engineer, CAFM Planner"],["PPM Process, Task Groups, PPM Frequencies, Service Contract PPMs","FM Manager, AMC Vendors"]]};
  mods.forEach(function(m){(ms[m.id]||[]).forEach(function(s){sessions.push({day:dayL(dn++),time:F.st+" – "+addH(F.st,parseInt(F.sd)||3),hrs:F.sd+"h",topics:s[0],att:s[1]});});});
  sessions.push({day:dayL(dn),time:F.st+" – "+addH(F.st,parseInt(F.sd)||3),hrs:F.sd+"h",topics:"Open Items Review, Configuration Decisions, Sign-Off, Next Steps",att:"All Stakeholders, Project Manager"});

  // Column widths for landscape (15840 - 2160 margins = 13680)
  var cw=[2400,1800,700,5280,3500];
  var xml="";

  // Title
  xml+=wxPara(wxText("BPR SESSION AGENDA",true,"185FA5",32),"center");
  xml+=wxPara(wxText(c+"  |  "+(F.bf||"TBD")+" to "+(F.bu||"TBD"),true,"2C2C2A",24),"center");
  xml+=wxPara(wxText("Prepared by: "+co+"  |  "+t,false,"5F5E5A",18),"center");
  xml+=wxPara(wxText(""),"left");
  xml+=wxPara(wxText("Yardi Team: "+team,true,"2C2C2A",20),"left");
  xml+=wxPara(wxText("Modules in Scope: "+mods.map(function(m){return m.name;}).join(", "),false,"5F5E5A",18),"left");
  xml+=wxPara(wxText(""),"left");

  // Table
  xml+="<w:tbl><w:tblPr><w:tblW w:w=\"13680\" w:type=\"dxa\"/><w:tblBorders><w:insideH w:val=\"single\" w:sz=\"4\" w:color=\"CCCCCC\"/><w:insideV w:val=\"single\" w:sz=\"4\" w:color=\"CCCCCC\"/></w:tblBorders></w:tblPr><w:tblGrid><w:gridCol w:w=\""+cw[0]+"\"/><w:gridCol w:w=\""+cw[1]+"\"/><w:gridCol w:w=\""+cw[2]+"\"/><w:gridCol w:w=\""+cw[3]+"\"/><w:gridCol w:w=\""+cw[4]+"\"/></w:tblGrid>";
  // Header row
  xml+="<w:tr><w:trPr><w:tblHeader/></w:trPr>"+wxHdrCell("Day & Date",cw[0])+wxHdrCell("Time",cw[1])+wxHdrCell("Hrs",cw[2])+wxHdrCell("Business Topics",cw[3])+wxHdrCell("Suggested Attendees",cw[4])+"</w:tr>";
  // Data rows
  sessions.forEach(function(s,i){
    var shade=i%2===1?"F5F5F5":"FFFFFF";
    xml+="<w:tr>"+wxDataCell(s.day,cw[0],shade)+wxDataCell(s.time,cw[1],shade)+wxDataCell(s.hrs,cw[2],shade)+wxDataCell(s.topics,cw[3],shade)+wxDataCell(s.att,cw[4],shade)+"</w:tr>";
  });
  xml+="</w:tbl>";
  xml+=wxPara(wxText(""),"left");
  xml+="<w:sectPr><w:pgSz w:w=\"15840\" w:h=\"12240\" w:orient=\"landscape\"/><w:pgMar w:top=\"1080\" w:right=\"1080\" w:bottom=\"1080\" w:left=\"1080\"/></w:sectPr>";
  return xml;
}

// ── Generate RFI from real template ──────────────────────────────────────────
async function genRfi(){
  loading.rfi=true; re();
  try{
    var buf = await fetchTemplate(TEMPLATES.rfi);
    var wb = XLSX.read(new Uint8Array(buf), {type:"array"});

    // Get RFI Index sheet
    var ws = wb.Sheets["RFI Index"];
    if(!ws) throw new Error("RFI Index sheet not found in template");

    // Replace XX in A1 with client name
    if(ws["A1"]) ws["A1"].v = cl();
    if(ws["A1"]) ws["A1"].w = cl();

    // Filter rows based on selected modules
    var rfiMods = new Set();
    sm().forEach(function(m){(M2R[m.id]||[]).forEach(function(n){rfiMods.add(n);});});

    // Find data rows and hide/show based on module selection
    // Get the range
    var range = XLSX.utils.decode_range(ws["!ref"]||"A1:P60");

    // Mark rows not in scope (set empty) — keep header rows (1-3)
    for(var r=3; r<=range.e.r; r++){
      var modCell = ws[XLSX.utils.encode_cell({r:r,c:1})]; // Column B = Yardi Module
      if(modCell && modCell.v){
        var modVal = String(modCell.v);
        if(!rfiMods.has(modVal)){
          // Mark row as not applicable by greying out
          // We can't hide rows in browser XLSX, so we add a note
          var remarkCell = XLSX.utils.encode_cell({r:r,c:11}); // Remarks column
          if(!ws[remarkCell]) ws[remarkCell]={t:"s",v:""};
          // Leave row but it will just have the data
        }
      }
    }

    // Update target date column for all data rows
    for(var r=3; r<=range.e.r; r++){
      var modCell = ws[XLSX.utils.encode_cell({r:r,c:1})];
      if(modCell && modCell.v && F.dl){
        var tgtCell = XLSX.utils.encode_cell({r:r,c:8}); // Target Date column
        ws[tgtCell] = {t:"s", v:F.dl};
      }
      // Update Project Team Member column
      if(modCell && modCell.v && F.con){
        var pmCell = XLSX.utils.encode_cell({r:r,c:6}); // Project Team Member
        if(!ws[pmCell] || !ws[pmCell].v){
          ws[pmCell] = {t:"s", v:F.con};
        }
      }
    }

    var wbOut = XLSX.write(wb, {type:"array", bookType:"xlsx"});
    var safe = cl().replace(/\s+/g,"_");
    dlFile(wbOut, "RFI_"+safe+".xlsx", "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet");
    done.add(5);
  }catch(e){alert("Error: "+e.message);}
  loading.rfi=false; re();
}

// ── Generate Email DOCX (uses VC template as base) ───────────────────────────
async function genEmail(){
  loading.email=true; re();
  try{
    var buf = await fetchTemplate(TEMPLATES.vc);
    var zip = await JSZip.loadAsync(buf);
    var emailXml = buildEmailXml();
    var docXml = await zip.files["word/document.xml"].async("string");
    docXml = docXml.replace(/<w:body>[\s\S]*<\/w:body>/, "<w:body>"+emailXml+"</w:body>");
    zip.file("word/document.xml", docXml);
    var processed = await zip.generateAsync({type:"arraybuffer", compression:"DEFLATE"});
    var safe = cl().replace(/\s+/g,"_");
    dlFile(processed, "Cloud_Email_"+safe+".docx", "application/vnd.openxmlformats-officedocument.wordprocessingml.document");
    done.add(2);
  }catch(e){alert("Error: "+e.message);}
  loading.email=false; re();
}
