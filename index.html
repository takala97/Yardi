<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yardi Project Setup Agent</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,-apple-system,sans-serif;font-size:13px}
body{background:#f0f2f5;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:20px}
.app{width:100%;max-width:980px;background:#fff;border-radius:12px;border:1px solid #e0e0e0;overflow:hidden;display:flex;flex-direction:column}
.top{background:#185FA5;color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;min-height:52px}
.tl{display:flex;align-items:center;gap:12px}
.tdiv{width:1px;height:24px;background:rgba(255,255,255,.3)}
.top h1{font-size:13px;font-weight:500}
.pill{font-size:11px;background:rgba(255,255,255,.15);padding:3px 10px;border-radius:20px}
.body{display:flex;flex:1}
.nav{width:190px;background:#f8f8f8;border-right:1px solid #e8e8e8;padding:14px 10px;flex-shrink:0;min-height:600px}
.ni{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;cursor:pointer;margin-bottom:2px}
.ni:hover{background:#ececec}.ni.act{background:#dbeafe}.ni.done{background:#dcfce7}
.nd{width:20px;height:20px;border-radius:50%;background:#ccc;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.ni.act .nd{background:#185FA5}.ni.done .nd{background:#16a34a}
.nl{font-size:11px;color:#666;line-height:1.3}.ni.act .nl{color:#185FA5;font-weight:600}.ni.done .nl{color:#16a34a}
.main{flex:1;overflow-y:auto;padding:20px 24px;min-height:600px;max-height:90vh}
.pt{font-size:17px;font-weight:600;color:#111;margin-bottom:3px}
.ps{font-size:12px;color:#888;margin-bottom:16px}
.card{border:1px solid #e8e8e8;border-radius:9px;padding:15px 17px;margin-bottom:12px;background:#fff}
.ct{font-size:12px;font-weight:600;color:#333;margin-bottom:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.lbl{font-size:11px;color:#555;margin-bottom:3px;display:block;font-weight:500}
input,select,textarea{width:100%;border:1px solid #ddd;border-radius:6px;padding:6px 9px;font-size:12px;color:#222;background:#fff;outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:#185FA5}
textarea{resize:vertical;min-height:52px;line-height:1.5}
.full{grid-column:1/-1}
.mods{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mo{border:1px solid #ddd;border-radius:8px;padding:10px 12px;cursor:pointer;display:flex;gap:9px}
.mo:hover{border-color:#93c5fd}.mo.on{border-color:#185FA5;background:#eff6ff}
.mc{width:15px;height:15px;border-radius:3px;background:#ccc;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff}
.mo.on .mc{background:#185FA5}
.mn{font-size:12px;font-weight:600;color:#222}.md{font-size:11px;color:#888;margin-top:2px}
.dbs{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.db{font-size:11px;padding:3px 10px;border-radius:20px;cursor:pointer;font-weight:500;user-select:none}
.db.on{background:#185FA5;color:#fff}.db.off{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit}
.btn:disabled{opacity:.5;cursor:not-allowed}
.bp{background:#185FA5;color:#fff}.bs{background:#f3f4f6;color:#374151;border:1px solid #d1d5db}.bg{background:#16a34a;color:#fff}.bw{background:#f59e0b;color:#fff}
.brow{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;align-items:center}
.info{font-size:11px;color:#1e40af;background:#dbeafe;border-radius:6px;padding:7px 10px;margin-bottom:10px}
.warn{font-size:11px;color:#92400e;background:#fef3c7;border-radius:6px;padding:7px 10px;margin-bottom:10px}
.tbr{display:flex;flex-wrap:wrap;border-bottom:1px solid #e5e7eb;margin-bottom:12px}
.tb{padding:6px 12px;font-size:11px;cursor:pointer;background:none;border:none;border-bottom:2px solid transparent;color:#6b7280;font-weight:500;font-family:inherit;margin-bottom:-1px}
.tb:hover{color:#185FA5}.tb.on{color:#185FA5;border-bottom-color:#185FA5}
.tr{display:flex;gap:6px;margin-bottom:6px}.tr input{flex:1}
.rm{width:28px;height:30px;border:1px solid #ddd;border-radius:5px;background:#fff;cursor:pointer;color:#9ca3af;font-size:11px}
.al{font-size:11px;color:#185FA5;background:none;border:none;cursor:pointer;padding:3px 0;font-family:inherit}
.rg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.sc{background:#f3f4f6;border-radius:8px;padding:12px}
.sl{font-size:10px;color:#6b7280;margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.sv{font-size:16px;font-weight:700;color:#111}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dc{border:1px solid #e5e7eb;border-radius:8px;padding:12px}
.dh{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.dn{font-size:12px;font-weight:600}.dd{font-size:11px;color:#6b7280;margin-bottom:8px}
.bk{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.bok{background:#dcfce7;color:#166534}.bpn{background:#fef3c7;color:#92400e}
hr.div{border:none;border-top:1px solid #e8e8e8;margin:12px 0}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ghcard{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:14px 16px;margin-bottom:12px}
.ghcard .ct{color:#166534}
.step-label{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:#185FA5;color:#fff;font-size:10px;font-weight:700;margin-right:6px;flex-shrink:0}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="tl">
      <img src="https://www.yardi.com/wp-content/client-mu-plugins/cmw-icons/svg/logos/yardi_logo.svg" alt="Yardi" height="24" onerror="this.style.display='none';document.getElementById('yt').style.display='block'" style="filter:brightness(0) invert(1);display:block">
      <span id="yt" style="display:none;font-weight:700;font-size:16px;color:#fff">Yardi</span>
      <div class="tdiv"></div><h1>Project Setup Agent</h1>
    </div>
    <span class="pill" id="pill">No project loaded</span>
  </div>
  <div class="body">
    <div class="nav" id="nav"></div>
    <div class="main" id="main"></div>
  </div>
</div>

function githubRawUrl(filename){

}

async function fetchTemplate(filename){
  var url = githubRawUrl(filename);
  var resp = await fetch(url);
  if(!resp.ok) throw new Error("Could not fetch template: "+filename+"\nURL: "+url+"\nStatus: "+resp.status+"\n\nMake sure your GitHub username, repo name, and file names are correct in the config section of this file.");
  return await resp.arrayBuffer();
}

// ── DOCX placeholder replacement using JSZip ──────────────────────────────────
async function processDocx(arrayBuffer, replacements){
  var zip = await JSZip.loadAsync(arrayBuffer);

  // Process document.xml — this is where all the text lives
  var xmlFiles = ["word/document.xml","word/header1.xml","word/footer1.xml","word/header2.xml","word/footer2.xml"];

  for(var i=0; i<xmlFiles.length; i++){
    var fname = xmlFiles[i];
    if(!zip.files[fname]) continue;
    var content = await zip.files[fname].async("string");

    // Replace placeholders
    for(var key in replacements){
      // Handle XX that may be split across XML runs — merge then replace
      content = content.split(key).join(replacements[key]);
    }

    zip.file(fname, content);
  }

  return zip.generate({type:"arraybuffer",compression:"DEFLATE",compressionOptions:{level:6},mimeType:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
}

// ── Download a file ───────────────────────────────────────────────────────────
function dlFile(buf, filename, mime){
  var blob = new Blob([buf], {type: mime});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

// Smart DOCX processor — replaces all {{TOKENS}} in template
async function processDocxSmart(arrayBuffer, clientName, consultant, dateStr, extraTokens){
  // Use PizZip + Docxtemplater — the proper libraries for docx templating in browser
  // These handle large images and complex docx files without corruption
  var tokens = {
    CLIENT_NAME:     clientName,
    CONSULTANT_NAME: consultant,
    DATE:            dateStr,
    SESSION_DATE:    (extraTokens && extraTokens.sessionDate)   || dateStr,
    WORKSHOP_OWNER:  (extraTokens && extraTokens.workshopOwner) || consultant,
    CLIENT_PIN:      F.pin  || "",
    TIMEZONE:        F.tz   || "",
    LIVE_WEBSHARE:   F.lw   || "",
    TEST_WEBSHARE:   F.tw   || "",
    SERVICE_MANAGER: F.sm   || "",
    BPR_FROM:        F.bf   || "",
    BPR_UNTIL:       F.bu   || "",
  };

  var zip = new PizZip(arrayBuffer);
  var doc = new docxtemplater(zip, {
    paragraphLoop: true,
    linebreaks: true,
    delimiters: {start: "{{", end: "}}"},
    nullGetter: function(part){ return ""; },
  });

  doc.render(tokens);

  var out = doc.getZip().generate({
    type: "arraybuffer",
    mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
    compression: "DEFLATE",
    compressionOptions: {level: 6}
  });

  return out;
}

function nextWorkDay(d){

function addWorkDays(startISO,n){

    }

    // Update target date column for all data rows
    for(var r=3; r<=range.e.r; r++){
      var modCell = ws[XLSX.utils.encode_cell({r:r,c:1})];
      if(modCell && modCell.v && F.dl){
        var tgtCell = XLSX.utils.encode_cell({r:r,c:8}); // Target Date column
        ws[tgtCell] = {t:"s", v:F.dl};
      }
      // Update Project Team Member column
      if(modCell && modCell.v && F.con){
        var pmCell = XLSX.utils.encode_cell({r:r,c:6}); // Project Team Member
        if(!ws[pmCell] || !ws[pmCell].v){
          ws[pmCell] = {t:"s", v:F.con};
        }
      }
    }

    var wbOut = XLSX.write(wb, {type:"array", bookType:"xlsx"});
    var safe = cl().replace(/\s+/g,"_");
    dlFile(wbOut, "RFI_"+safe+".xlsx", "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet");
    done.add(5);
  }catch(e){alert("Error: "+e.message);}
  loading.rfi=false; re();
}

// ── Generate Email DOCX (uses VC template as base) ───────────────────────────
async function genEmail(){
  loading.email=true; re();
  try{
    var buf = await fetchTemplate(TEMPLATES.vc);
    var zip = await JSZip.loadAsync(buf);
    var emailXml = buildEmailXml();
    var docXml = zip.files["word/document.xml"].asText();
    docXml = docXml.replace(/<w:body>[\s\S]*<\/w:body>/, "<w:body>"+emailXml+"</w:body>");
    zip.file("word/document.xml", docXml);
    var processed = zip.generate({type:"arraybuffer", compression:"DEFLATE", compressionOptions:{level:6}, mimeType:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
    var safe = cl().replace(/\s+/g,"_");
    dlFile(processed, "Cloud_Email_"+safe+".docx", "application/vnd.openxmlformats-officedocument.wordprocessingml.document");
    done.add(2);
  }catch(e){alert("Error: "+e.message);}
  loading.email=false; re();
}
