    +'<button class="btn bp" onclick="go(1)">Continue →</button></div>';
}
function p2(){return'<div><div class="pt">Cloud environment setup email</div><div class="ps">Click the button below to generate and download a formatted Word document.</div><div class="card"><div class="ct">Recipients</div><div class="g2">'+fl("To (cloud team)","to","Nereah.Abwao@Yardi.Com")+fl("CC (project team)","cc","Rajat.Agarwal@Yardi.Com, ...")+fl("Special notes","cn","e.g. DBs to be copy of AIM GOLD DB.","textarea",{full:true})+'</div></div>'+ldBtn("email","Email .docx","genEmail()")+'<div class="brow"><button class="btn bs" onclick="go(0)">← Back</button><button class="btn bp" onclick="go(2)">Continue →</button></div></div>';}
function p3(){var rH=tr.map(function(r,i){return'<div class="tr"><input value="'+esc(r)+'" oninput="tr['+i+']=this.value" placeholder="Name — Role"><button class="rm" onclick="rt('+i+')">✕</button></div>';}).join("");return'<div><div class="pt">BPR session agenda</div><div class="ps">Click to generate and download a formatted Word document (landscape, A4).</div><div class="card"><div class="ct">Session schedule</div><div class="g2">'+fl("Start date","bf","","date")+fl("End date","bu","","date")+fl("Daily start time","st","10:00 AM")+fl("Hours per session","sd","3")+'</div></div><div class="card"><div class="ct">Yardi team members</div>'+rH+'<button class="al" onclick="at()">+ Add member</button></div>'+ldBtn("agenda","Agenda .docx","genAgenda()")+'<div class="brow"><button class="btn bs" onclick="go(1)">← Back</button><button class="btn bp" onclick="go(3)">Continue →</button></div></div>';}
function p4(){
  var tabs=sm().filter(function(m){return TREQS[m.id];});
  var tH=tabs.map(function(m){return'<button class="tb'+(bt===m.id?' on':'')+'" onclick="sbt(\''+m.id+'\')">'+TN[m.id]+'</button>';}).join("");
  var cur=tabs.find(function(m){return m.id===bt;});
  var body=cur?'<div class="card"><div class="ct">'+TN[bt]+' BPR <span style="font-size:10px;color:#888;font-weight:400">— follows your uploaded template exactly</span></div><div style="margin-bottom:10px"><label class="lbl">Additional client-specific notes (optional)</label><textarea oninput="bc[\''+bt+'\']=this.value" placeholder="e.g. Client has 150 vendors, uses EFT only, 3-level approval DOA...">'+(bc[bt]||"")+'</textarea></div>'+ldBtn("bpr_"+bt,TN[bt]+" .docx","genBpr('"+bt+"')")+'</div>':'<div class="info">No modules selected. Go back to Step 1.</div>';
  return'<div><div class="pt">BPR documents</div><div class="ps">Each module generates a complete Word document following your real uploaded template.</div><div class="info">📄 Structure: Version Control → Sign Off → Copyright → Overview → Requirements Table → Additional Requirements → RFI reference. "XX" replaced with client name throughout.</div><div class="tbr">'+tH+'</div>'+body+'<div class="brow"><button class="btn bs" onclick="go(2)">← Back</button><button class="btn bp" onclick="go(4)">Continue →</button></div></div>';
}
function p5(){return'<div><div class="pt">RFI collection sheet</div><div class="ps">Generates a real Excel file matching your original RFI template — same columns, filtered to selected modules.</div><div class="card"><div class="ct">Configuration</div><div class="g2">'+fl("Project focal point","fo","e.g. John Smith")+fl("Target completion date","dl","","date")+fl("Instructions for client","rn","e.g. Please fill Critical items before first BPR session.","textarea",{full:true})+'</div></div>'+ldBtn("rfi","RFI .xlsx","genRfi()")+'<div class="brow"><button class="btn bs" onclick="go(3)">← Back</button><button class="btn bp" onclick="go(5)">Continue →</button></div></div>';}
function p6(){
  var ds=[{key:"email",lb:"Cloud Setup Email .docx",step:1,fn:"genEmail()"},{key:"agenda",lb:"BPR Session Agenda .docx",step:2,fn:"genAgenda()"}];
  sm().filter(function(m){return TREQS[m.id];}).forEach(function(m){ds.push({key:"bpr_"+m.id,lb:TN[m.id]+" BPR .docx",step:3,fn:"genBpr('"+m.id+"')"});});
  ds.push({key:"rfi",lb:"RFI Collection Sheet .xlsx",step:4,fn:"genRfi()"});
  var rdy=ds.filter(function(d){return done.has(d.step);}).length;
  var stats='<div class="rg">'+[["Client",cl()],["Modules",sm().length+" selected"],["Downloaded",rdy+" / "+ds.length]].map(function(p){return'<div class="sc"><div class="sl">'+p[0]+'</div><div class="sv">'+p[1]+'</div></div>';}).join("")+'</div>';
  var cards=ds.map(function(d){var ok=done.has(d.step),ld=loading[d.key];return'<div class="dc"><div class="dh"><span class="dn">'+d.lb+'</span><span class="bk '+(ok?"bok":"bpn")+'">'+(ok?"✓ Downloaded":"Pending")+'</span></div><div class="dd">'+(ok?"File downloaded to your Downloads folder.":"Generate from the relevant step.")+'</div><button class="btn '+(ok?"bg":"bp")+'" style="font-size:11px;padding:5px 11px" '+(ld?"disabled":"")+' onclick="'+d.fn+'">'+(ld?'<span class="spin"></span>':ok?"↓ Re-download":"↓ Generate & Download")+'</button></div>';}).join("");
  return'<div><div class="pt">Review &amp; download all files</div><div class="ps">All deliverables for '+cl()+'. Each button generates and downloads the real file.</div>'+stats+'<div class="dg">'+cards+'</div><div class="brow"><button class="btn bs" onclick="go(4)">← Back</button></div></div>';
}
re();
</script>
