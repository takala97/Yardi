var step=0,done=new Set(),loading={};
var moduleSessions={};

var agendaRows={};

var moduleSessions={};
function setMS(id,key,val){if(!moduleSessions[id])moduleSessions[id]={};moduleSessions[id][key]=val;}
var agendaRows={};

var am=new Set(["vc","p2p","fa","wo","fm"]),adb=new Set(DBS),bt="vc",tr=["",""];
var F={name:"",pin:"",tz:"",sdb:"",lw:"",tw:"",con:"",sm:"Yes",pi:"",to:"Nereah.Abwao@Yardi.Com",cc:"",cn:"",bf:"",bu:"",st:"10:00 AM",sd:"3",fo:"",dl:"",rn:""};

// ── Fetch file from GitHub raw content ────────────────────────────────────────
function githubRawUrl(filename){
  return "https://raw.githubusercontent.com/"+GITHUB_USER+"/"+GITHUB_REPO+"/"+GITHUB_BRANCH+"/templates/"+filename;
}

async function fetchTemplate(filename){
  var url = githubRawUrl(filename);
  var resp = await fetch(url);
  if(!resp.ok) throw new Error("Could not fetch template: "+filename+"\nURL: "+url+"\nStatus: "+resp.status+"\n\nMake sure your GitHub username, repo name, and file names are correct in the config section of this file.");
  return await resp.arrayBuffer();
}

// ── DOCX placeholder replacement using JSZip ──────────────────────────────────
async function processDocx(arrayBuffer, replacements){
  var zip = await JSZip.loadAsync(arrayBuffer);

  // Process document.xml — this is where all the text lives
  var xmlFiles = ["word/document.xml","word/header1.xml","word/footer1.xml","word/header2.xml","word/footer2.xml"];

  for(var i=0; i<xmlFiles.length; i++){
    var fname = xmlFiles[i];
    if(!zip.files[fname]) continue;
    var content = await zip.files[fname].async("string");

    // Replace placeholders
    for(var key in replacements){
      // Handle XX that may be split across XML runs — merge then replace
      content = content.split(key).join(replacements[key]);
    }

    zip.file(fname, content);
  }

  return await zip.generateAsync({type:"arraybuffer", compression:"DEFLATE"});
}

// ── Download a file ───────────────────────────────────────────────────────────
function dlFile(buf, filename, mime){
  var blob = new Blob([buf], {type: mime});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

// ── Generate BPR document from real template ─────────────────────────────────
async function genBpr(id){
  loading["bpr_"+id]=true; re();
  try{
    var c = cl();
    var buf = await fetchTemplate(TEMPLATES[id]);
    var replacements = {
      "XX": c,
      // Version control date/author are also XX in the templates
    };
    // We need smarter replacement for version table
    // The version table has XX in date col and XX in author col
    // We'll handle this by doing a more targeted XML edit
    var processed = await processDocxSmart(buf, c, F.con||"Yardi Consultant", tdShort());
    // processDocxSmart now handles all {{TOKEN}} replacements automatically
    var safe = c.replace(/\s+/g,"_");
    dlFile(processed, "BPR_"+TN[id].replace(/\s+/g,"_")+"_"+safe+".docx", "application/vnd.openxmlformats-officedocument.wordprocessingml.document");
    done.add(4);
  }catch(e){
    alert("Error: "+e.message);
  }
  loading["bpr_"+id]=false; re();
}

// Smart DOCX processor — replaces all {{TOKENS}} in template
async function processDocxSmart(arrayBuffer, clientName, consultant, dateStr){
  var zip = await JSZip.loadAsync(arrayBuffer);
  var tokens = {
    "{{CLIENT_NAME}}":     clientName,
    "{{CONSULTANT_NAME}}": consultant,
    "{{DATE}}":            dateStr,
    "{{CLIENT_PIN}}":      F.pin  || "",
    "{{TIMEZONE}}":        F.tz   || "",
    "{{LIVE_WEBSHARE}}":   F.lw   || "",
    "{{TEST_WEBSHARE}}":   F.tw   || "",
    "{{SERVICE_MANAGER}}": F.sm   || "",
    "{{BPR_FROM}}":        F.bf   || "",
    "{{BPR_UNTIL}}":       F.bu   || "",
  };
  var filesToProcess = ["word/document.xml","word/header1.xml","word/footer1.xml","word/header2.xml","word/footer2.xml"];
  for(var i=0;i<filesToProcess.length;i++){
    var fname=filesToProcess[i];
    if(!zip.files[fname]) continue;
    var xml = await zip.files[fname].async("string");
    for(var token in tokens){
      var safeVal=String(tokens[token]).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      xml = xml.split(token).join(safeVal);
    }
    zip.file(fname, xml);
  }
  return await zip.generateAsync({type:"arraybuffer",compression:"DEFLATE"});
}

// ── Generate Agenda from real BPR template (Vendor Cafe as base) ─────────────
function buildAgendaRowDefs(){
  var rows=[],mods=sm();
  var hasVC=mods.some(function(m){return m.id==="vc";}),hasP2P=mods.some(function(m){return m.id==="p2p";}),hasFA=mods.some(function(m){return m.id==="fa";}),hasWO=mods.some(function(m){return m.id==="wo";}),hasFM=mods.some(function(m){return m.id==="fm";});
  rows.push({key:"kickoff",label:"Introduction & Kickoff",alwaysOn:true,items:"Introduction and Kickoff with the Project Stakeholder and the Team\nProject plan walkthrough\nYardi platform overview",attendees:"All stakeholders\nProcurement\nFacilities\nFinance (AP)\nIT"});
  if(hasVC)rows.push({key:"vc",label:"Vendor Cafe",items:"Vendor Markets & Categories\nVendor Invitation & Onboarding Process\nVendor Portal Registration\nVendor Profile Creation, Submission & Approval\nVendor Cafe Dashboard\nPurchase Orders in Vendor Cafe\nInvoicing from Vendor Cafe\nVendor SOA\nBPR & RFI Finalization",attendees:"Vendor Management Team\nProcurement\nFinance (AP)\nIT"});
  if(hasP2P)rows.push({key:"p2p_day1",label:"Procurement",items:"Purchase Requisition: Data Entry, Workflows/DOA\nPurchase Orders: Dashboards, Data Entry, Workflows/DOA, PO Printing\nGRN Process\nPurchase Order Reports\nProcure to Pay App\nBPR & RFI Finalization",attendees:"Procurement\nFinance (AP)\nIT"});
  if(hasP2P)rows.push({key:"p2p_day2",label:"Accounts Payable",items:"Vendor Invoicing and Workflow\nPayment Process\nVendor Advances\nPetty Cash Management\nPO Accrual\nPrepaid Expenses\nService Contract Management (AMC)\nProcure to Pay App\nBPR & RFI Finalization",attendees:"Finance (AP)\nProcurement / AMC Team\nIT"});
  if(hasFA)rows.push({key:"fa",label:"Fixed Asset Manager",items:"Asset Groups & Types\nDepreciation Methods & Conventions\nAsset Creation Workflows\nAsset Lifecycle Transactions: Purchase, Transfer, Disposal, Impairment, Revalue\nAsset Warranty & Barcode\nAsset Auto Code configuration\nBPR & RFI Finalization",attendees:"Finance Manager\nFM Manager\nIT"});
  if(hasWO)rows.push({key:"wo",label:"Facility Management - Work Orders",items:"Reactive Maintenance: Service Request & Work Order\nWork Order Creation Process\nWO Review by Outsourced Partner\nWO Assignment to Technician\nWO Quotation Process\nWO Financials: Payment to Vendor, Charge to Tenant\nInventory Consumption\nWO Mobile App\nWO SLA Tracking\nWO Technician Time Tracking\nWO Analytics\nBPR & RFI Finalization",attendees:"Facility Management\nFinance (AP)\nIT"});
  if(hasFM)rows.push({key:"fm",label:"Facility Management - Inspection & PPM",items:"Inspection: Introduction & Overview\nInspection Templates\nInspection Creation, Assignment & Scheduling\nInspector Working Hours and Slots\nMobile App Execution\nInspection Finalization & Reporting\nPPM: Introduction & Overview\nEquipment Templates, Creation & Components\nPlanned Maintenance Creation, Post & Schedule\nAuto Work Order Creation for Faults\nReports\nBPR & RFI Finalization",attendees:"Facility Management\nFinance (AP)\nIT"});
  return rows;
}
function fmtTime12(t){try{var p=t.split(":");var h=parseInt(p[0]),m=p[1]||"00",ap=h>=12?"PM":"AM";var h12=h>12?h-12:(h===0?12:h);return h12+":"+m+" "+ap;}catch(e){return t;}}
function fmtDateLong(iso){if(!iso)return "TBD";try{var d=new Date(iso+"T00:00:00");return d.toLocaleDateString("en-GB",{weekday:"long",day:"2-digit",month:"short",year:"numeric"});}catch(e){return iso;}}
function getBprFrom(){var d=Object.values(agendaRows).map(function(r){return r.date;}).filter(Boolean).sort();return d.length?fmtDateLong(d[0]):"TBD";}
function getBprUntil(){var d=Object.values(agendaRows).map(function(r){return r.date;}).filter(Boolean).sort();return d.length?fmtDateLong(d[d.length-1]):"TBD";}
function buildAgendaTableXml(){
  var rows=buildAgendaRowDefs(),xml="";
  function xe(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  var rPr='<w:rPr><w:rFonts w:ascii="Tahoma" w:hAnsi="Tahoma" w:cs="Tahoma"/><w:sz w:val="22"/><w:szCs w:val="22"/></w:rPr>';
  var rPrB='<w:rPr><w:rFonts w:ascii="Tahoma" w:hAnsi="Tahoma" w:cs="Tahoma"/><w:b/><w:bCs/><w:sz w:val="22"/><w:szCs w:val="22"/></w:rPr>';
  function para(t,rp,c){return'<w:p><w:pPr><w:spacing w:before="60" w:after="60"/>'+(c?'<w:jc w:val="center"/>':'')+'</w:pPr><w:r>'+rp+'<w:t xml:space="preserve">'+xe(t)+'</w:t></w:r></w:p>';}
  function blt(t,rp){return'<w:p><w:pPr><w:pStyle w:val="ListParagraph"/><w:numPr><w:ilvl w:val="0"/><w:numId w:val="1"/></w:numPr><w:spacing w:before="40" w:after="40"/></w:pPr><w:r>'+rp+'<w:t xml:space="preserve">'+xe(t)+'</w:t></w:r></w:p>';}
  function tc(w,inner,shade){return'<w:tc><w:tcPr><w:tcW w:w="'+w+'" w:type="dxa"/>'+(shade?'<w:shd w:val="clear" w:color="auto" w:fill="F2F2F2"/>':'')+'</w:tcPr>'+inner+'</w:tc>';}
  rows.forEach(function(row,idx){
    var rs=agendaRows[row.key]||{},shade=idx%2!==0;
    var dateStr=rs.date?fmtDateLong(rs.date):"TBD";
    var timeStr=(rs.timeFrom&&rs.timeTo)?(fmtTime12(rs.timeFrom)+" – "+fmtTime12(rs.timeTo)):"08:00 AM – 03:00 PM";
    var items=((rs.items!=null)?rs.items:row.items).split("\n").map(function(s){return s.trim();}).filter(Boolean);
    var atts=((rs.attendees!=null)?rs.attendees:row.attendees).split("\n").map(function(s){return s.trim();}).filter(Boolean);
    var iXml=items.map(function(t,i){return blt(t,i===0?rPrB:rPr);}).join("");
    var aXml=atts.map(function(a){return para(a,rPr,false);}).join("");
    xml+='<w:tr>'+tc(1500,para(dateStr,rPr,true),shade)+tc(1500,para(timeStr,rPr,true),shade)+tc(4860,iXml,shade)+tc(1500,aXml,shade)+'</w:tr>';
  });
  return xml;
}
async function injectAgendaRows(arrayBuffer){
  var src=new Uint8Array(arrayBuffer);
  function r16(b,o){return b[o]|(b[o+1]<<8);}
  function r32(b,o){return((b[o]|(b[o+1]<<8)|(b[o+2]<<16)|(b[o+3]<<24))>>>0);}
  function w32(b,o,v){b[o]=v&255;b[o+1]=(v>>8)&255;b[o+2]=(v>>16)&255;b[o+3]=(v>>24)&255;}
  var eocd=-1;
  for(var i=src.length-22;i>=0;i--){if(src[i]===0x50&&src[i+1]===0x4B&&src[i+2]===0x05&&src[i+3]===0x06){eocd=i;break;}}
  var cdOff=r32(src,eocd+16),cdCnt=r16(src,eocd+10),pos=cdOff;
  var entries=[];
  for(var i=0;i<cdCnt;i++){
    if(r32(src,pos)!==0x02014B50)break;
    var cm=r16(src,pos+10),cs=r32(src,pos+20),lo=r32(src,pos+42);
    var fnl=r16(src,pos+28),exl=r16(src,pos+30),cml=r16(src,pos+32);
    var crc=r32(src,pos+16),us=r32(src,pos+24);
    entries.push({fn:new TextDecoder().decode(src.slice(pos+46,pos+46+fnl)),cm:cm,crc:crc,cs:cs,us:us,lo:lo,fnl:fnl,exl:exl,cml:cml,cdp:pos});
    pos+=46+fnl+exl+cml;
  }
  var docE=null;
  for(var i=0;i<entries.length;i++){if(entries[i].fn==="word/document.xml"){docE=entries[i];break;}}
  if(!docE)return arrayBuffer;
  var lhFnl=r16(src,docE.lo+26),lhExl=r16(src,docE.lo+28),ds=docE.lo+30+lhFnl+lhExl;
  var xml=new TextDecoder("utf-8").decode(src.slice(ds,ds+docE.cs));
  var rowsXml=buildAgendaTableXml();
  var newXml=xml.replace(/(<w:trPr>\s*<w:cantSplit[/]>\s*<w:tblHeader[/]>[\s\S]*?<[/]w:tr>)([\s\S]*)(<[/]w:tbl>)/,function(m,h,_,c){return h+rowsXml+c;});
  var newBytes=new TextEncoder().encode(newXml);
  var newCrc=crc32js(newBytes);
  var parts=[],offsets=[],writeOff=0;
  for(var ei=0;ei<entries.length;ei++){
    var e=entries[ei];
    var lhF=r16(src,e.lo+26),lhX=r16(src,e.lo+28),dss=e.lo+30+lhF+lhX;
    var lh=new Uint8Array(src.slice(e.lo,dss));
    offsets.push(writeOff);
    var fd;
    if(e.fn==="word/document.xml"){fd=newBytes;w32(lh,14,newCrc);w32(lh,18,newBytes.length);w32(lh,22,newBytes.length);lh[8]=0;lh[9]=0;}
    else{fd=src.slice(dss,dss+e.cs);}
    parts.push(lh);writeOff+=lh.length;parts.push(fd);writeOff+=fd.length;
  }
  var newCdOff=writeOff;
  for(var ei=0;ei<entries.length;ei++){
    var e=entries[ei];
    var cd=new Uint8Array(src.slice(e.cdp,e.cdp+46+e.fnl+e.exl+e.cml));
    if(e.fn==="word/document.xml"){w32(cd,16,newCrc);w32(cd,20,newBytes.length);w32(cd,24,newBytes.length);cd[10]=0;cd[11]=0;}
    w32(cd,42,offsets[ei]);parts.push(cd);writeOff+=cd.length;
  }
  var newEocd=new Uint8Array(src.slice(eocd,eocd+22));
  w32(newEocd,12,writeOff-newCdOff);w32(newEocd,16,newCdOff);parts.push(newEocd);
  var total=parts.reduce(function(s,p){return s+p.length;},0);
  var out=new Uint8Array(total),off=0;
  for(var pi=0;pi<parts.length;pi++){out.set(parts[pi],off);off+=parts[pi].length;}
  return out.buffer;
}

async function genRfi(){
  loading.rfi=true; re();
  try{
    var buf = await fetchTemplate(TEMPLATES.rfi);
    var wb = XLSX.read(new Uint8Array(buf), {type:"array"});

    // Get RFI Index sheet
    var ws = wb.Sheets["RFI Index"];
    if(!ws) throw new Error("RFI Index sheet not found in template");

    // Replace XX in A1 with client name
    if(ws["A1"]) ws["A1"].v = cl();
    if(ws["A1"]) ws["A1"].w = cl();

    // Filter rows based on selected modules
    var rfiMods = new Set();
    sm().forEach(function(m){(M2R[m.id]||[]).forEach(function(n){rfiMods.add(n);});});

    // Find data rows and hide/show based on module selection
    // Get the range
    var range = XLSX.utils.decode_range(ws["!ref"]||"A1:P60");

    // Mark rows not in scope (set empty) — keep header rows (1-3)
    for(var r=3; r<=range.e.r; r++){
      var modCell = ws[XLSX.utils.encode_cell({r:r,c:1})]; // Column B = Yardi Module
      if(modCell && modCell.v){
        var modVal = String(modCell.v);
        if(!rfiMods.has(modVal)){
          // Mark row as not applicable by greying out
          // We can't hide rows in browser XLSX, so we add a note
          var remarkCell = XLSX.utils.encode_cell({r:r,c:11}); // Remarks column
          if(!ws[remarkCell]) ws[remarkCell]={t:"s",v:""};
          // Leave row but it will just have the data
        }
      }
    }

    // Update target date column for all data rows
    for(var r=3; r<=range.e.r; r++){
      var modCell = ws[XLSX.utils.encode_cell({r:r,c:1})];
      if(modCell && modCell.v && F.dl){
        var tgtCell = XLSX.utils.encode_cell({r:r,c:8}); // Target Date column
        ws[tgtCell] = {t:"s", v:F.dl};
      }
      // Update Project Team Member column
      if(modCell && modCell.v && F.con){
        var pmCell = XLSX.utils.encode_cell({r:r,c:6}); // Project Team Member
        if(!ws[pmCell] || !ws[pmCell].v){
          ws[pmCell] = {t:"s", v:F.con};
        }
      }
    }

    var wbOut = XLSX.write(wb, {type:"array", bookType:"xlsx"});
    var safe = cl().replace(/\s+/g,"_");
    dlFile(wbOut, "RFI_"+safe+".xlsx", "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet");
    done.add(5);
  }catch(e){alert("Error: "+e.message);}
  loading.rfi=false; re();
}

async function genEmail(){
  loading.email=true; re();
  try{
    var buf = await fetchTemplate(TEMPLATES.vc);
    var zip = await JSZip.loadAsync(buf);
    var emailXml = buildEmailXml();
    var docXml = await zip.files["word/document.xml"].async("string");
    docXml = docXml.replace(/<w:body>[\s\S]*<\/w:body>/, "<w:body>"+emailXml+"</w:body>");
    zip.file("word/document.xml", docXml);
    var processed = await zip.generateAsync({type:"arraybuffer", compression:"DEFLATE"});
    var safe = cl().replace(/\s+/g,"_");
    dlFile(processed, "Cloud_Email_"+safe+".docx", "application/vnd.openxmlformats-officedocument.wordprocessingml.document");
    done.add(2);
  }catch(e){alert("Error: "+e.message);}
  loading.email=false; re();
}
