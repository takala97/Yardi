// ── CONFIGURATION — update this with your GitHub details ──────────────────────

var MODS=[{id:"vc",name:"Vendor Cafe",desc:"Vendor onboarding & portal"},{id:"p2p",name:"Procure to Pay",desc:"PR/PO, invoices, payments"},{id:"fa",name:"Fixed Asset Manager",desc:"Assets & depreciation"},{id:"wo",name:"Work Orders",desc:"FM work orders"},{id:"fm",name:"Inspection & PPM",desc:"Inspections, PPM"}];

var TN={vc:"Vendor Cafe",p2p:"Procure to Pay",fa:"Fixed Assets",wo:"Work Orders",fm:"Inspection & PPM"};
var M2R={vc:["Vendor Café"],p2p:["P2P","P2P Services"],fa:["Fixed Assets"],wo:["Facility Manager"],fm:["Facility Manager"]};

var step=0,done=new Set(),loading={};
var moduleSessions={};
function setMS(id,key,val){if(!moduleSessions[id])moduleSessions[id]={};moduleSessions[id][key]=val;}
var moduleSessions={};
function setMS(id,key,val){if(!moduleSessions[id])moduleSessions[id]={};moduleSessions[id][key]=val;}
var am=new Set(["vc","p2p","fa","wo","fm"]),adb=new Set(DBS),bt="vc",tr=["",""];
var F={name:"",pin:"",tz:"",sdb:"",lw:"",tw:"",con:"",sm:"Yes",pi:"",to:"Nereah.Abwao@Yardi.Com",cc:"",cn:"",bf:"",bu:"",st:"10:00 AM",sd:"3",fo:"",dl:"",rn:""};

function cl(){return F.name||"[Client]";}

function addH(t,h){try{var p=t.match(/(\d+):(\d+)\s*(AM|PM)?/i);if(!p)return t;var hh=parseInt(p[1]),mm=parseInt(p[2]),ap=(p[3]||"").toUpperCase();if(ap==="PM"&&hh!==12)hh+=12;if(ap==="AM"&&hh===12)hh=0;hh+=h;var na=hh>=12?"PM":"AM";if(hh>12)hh-=12;if(hh===0)hh=12;return hh+":"+String(mm).padStart(2,"0")+" "+na;}catch(e){return t;}}

// ── Fetch file from GitHub raw content ────────────────────────────────────────
function githubRawUrl(filename){
  return "https://raw.githubusercontent.com/"+GITHUB_USER+"/"+GITHUB_REPO+"/"+GITHUB_BRANCH+"/templates/"+filename;
}

async function fetchTemplate(filename){
  var url = githubRawUrl(filename);
  var resp = await fetch(url);
  if(!resp.ok) throw new Error("Could not fetch template: "+filename+"\nURL: "+url+"\nStatus: "+resp.status+"\n\nMake sure your GitHub username, repo name, and file names are correct in the config section of this file.");
  return await resp.arrayBuffer();
}

// ── DOCX placeholder replacement using JSZip ──────────────────────────────────
async function processDocx(arrayBuffer, replacements){
  var zip = await JSZip.loadAsync(arrayBuffer);

  // Process document.xml — this is where all the text lives
  var xmlFiles = ["word/document.xml","word/header1.xml","word/footer1.xml","word/header2.xml","word/footer2.xml"];

  for(var i=0; i<xmlFiles.length; i++){
    var fname = xmlFiles[i];
    if(!zip.files[fname]) continue;
    var content = await zip.files[fname].async("string");

    // Replace placeholders
    for(var key in replacements){
      // Handle XX that may be split across XML runs — merge then replace
      content = content.split(key).join(replacements[key]);
    }

    zip.file(fname, content);
  }

  return zip.generate({type:"arraybuffer",compression:"DEFLATE",compressionOptions:{level:6},mimeType:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
}

// ── Download a file ───────────────────────────────────────────────────────────
function dlFile(buf, filename, mime){
  var blob = new Blob([buf], {type: mime});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

// ── Generate BPR document from real template ─────────────────────────────────
async function genBpr(id){
  loading["bpr_"+id]=true; re();
  try{
    var c = cl();
    var buf = await fetchTemplate(TEMPLATES[id]);
    // Get per-module session details
    var ms = moduleSessions[id] || {};
    var sessionDate = ms.startDate ? fmtDate(new Date(ms.startDate)) : tdShort();
    var workshopOwner = ms.workshopOwner || F.con || "Yardi Consultant";
    var extraTokens = {
      sessionDate: sessionDate,
      workshopOwner: workshopOwner
    };
    var processed = await processDocxSmart(buf, c, F.con||"Yardi Consultant", tdShort(), extraTokens);
    var safe = c.replace(/\s+/g,"_");
    dlFile(processed, "BPR_"+TN[id].replace(/\s+/g,"_")+"_"+safe+".docx", "application/vnd.openxmlformats-officedocument.wordprocessingml.document");
    done.add(4);
  }catch(e){
    alert("Error generating BPR: "+e.message);
  }
  loading["bpr_"+id]=false; re();
}

// Smart DOCX processor — replaces all {{TOKENS}} in template
async function processDocxSmart(arrayBuffer, clientName, consultant, dateStr, extraTokens){
  var tokens = {
    "{{CLIENT_NAME}}":     clientName || "",
    "{{CONSULTANT_NAME}}": consultant || "",
    "{{DATE}}":            dateStr || "",
    "{{SESSION_DATE}}":    (extraTokens && extraTokens.sessionDate)   || dateStr || "",
    "{{WORKSHOP_OWNER}}":  (extraTokens && extraTokens.workshopOwner) || consultant || "",
    "{{CLIENT_PIN}}":      F.pin  || "",
    "{{TIMEZONE}}":        F.tz   || "",
    "{{LIVE_WEBSHARE}}":   F.lw   || "",
    "{{TEST_WEBSHARE}}":   F.tw   || "",
    "{{SERVICE_MANAGER}}": F.sm   || "",
    "{{BPR_FROM}}":        F.bf   || "",
    "{{BPR_UNTIL}}":       F.bu   || "",
  };
  function xe(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  var xmlTargets={"word/document.xml":1,"word/header1.xml":1,"word/footer1.xml":1,"word/header2.xml":1,"word/footer2.xml":1,"word/header3.xml":1,"word/footer3.xml":1};
  return await zipReplaceTokens(arrayBuffer, tokens, xe, xmlTargets);
}

// ── Pure JS ZIP token replacer — no libraries, uses native browser APIs ──────
async function zipReplaceTokens(arrayBuffer, tokens, xe, xmlTargets){
  var src = new Uint8Array(arrayBuffer);

  function r16(b,o){return b[o]|(b[o+1]<<8);}
  function r32(b,o){return((b[o]|(b[o+1]<<8)|(b[o+2]<<16)|(b[o+3]<<24))>>>0);}
  function w32(b,o,v){b[o]=v&255;b[o+1]=(v>>8)&255;b[o+2]=(v>>16)&255;b[o+3]=(v>>24)&255;}

  // Find EOCD
  var eocd=-1;
  for(var i=src.length-22;i>=0;i--){if(src[i]===0x50&&src[i+1]===0x4B&&src[i+2]===0x05&&src[i+3]===0x06){eocd=i;break;}}
  if(eocd<0) throw new Error("Invalid ZIP");
  var cdOff=r32(src,eocd+16), cdCnt=r16(src,eocd+10);

  // Parse central directory
  var entries=[], pos=cdOff;
  for(var i=0;i<cdCnt;i++){
    if(r32(src,pos)!==0x02014B50) break;
    var cm=r16(src,pos+10),crc=r32(src,pos+16),cs=r32(src,pos+20),us=r32(src,pos+24);
    var fnl=r16(src,pos+28),exl=r16(src,pos+30),cml=r16(src,pos+32),lo=r32(src,pos+42);
    var fn=new TextDecoder().decode(src.slice(pos+46,pos+46+fnl));
    entries.push({fn:fn,cm:cm,crc:crc,cs:cs,us:us,lo:lo,fnl:fnl,exl:exl,cml:cml,cdp:pos});
    pos+=46+fnl+exl+cml;
  }

  // Process XML files
  var replacements={};
  for(var ei=0;ei<entries.length;ei++){
    var e=entries[ei];
    if(!xmlTargets[e.fn]) continue;
    var lhFnl=r16(src,e.lo+26),lhExl=r16(src,e.lo+28);
    var ds=e.lo+30+lhFnl+lhExl;
    var compData=src.slice(ds,ds+e.cs);
    // Decompress
    var rawBytes;
    if(e.cm===8){rawBytes=await inflateRaw(compData);}
    else{rawBytes=compData;}
    // Replace tokens
    var xml=new TextDecoder("utf-8").decode(rawBytes);
    for(var tok in tokens){xml=xml.split(tok).join(xe(tokens[tok]));}
    rawBytes=new TextEncoder().encode(xml);
    // Recompress
    var recomp=await deflateRaw(rawBytes);
    var newCrc=calcCrc32(rawBytes);
    replacements[e.fn]={data:recomp,crc:newCrc,cs:recomp.length,us:rawBytes.length};
  }

  // Rebuild ZIP
  var parts=[], offsets=[];
  var writeOff=0;
  for(var ei=0;ei<entries.length;ei++){
    var e=entries[ei];
    var lhFnl=r16(src,e.lo+26),lhExl=r16(src,e.lo+28);
    var ds=e.lo+30+lhFnl+lhExl;
    var lh=new Uint8Array(src.slice(e.lo,ds));
    var fd;
    offsets.push(writeOff);
    if(replacements[e.fn]){
      var r=replacements[e.fn];
      fd=r.data;
      w32(lh,14,r.crc); w32(lh,18,r.cs); w32(lh,22,r.us);
    } else {
      fd=src.slice(ds,ds+e.cs);
    }
    parts.push(lh); writeOff+=lh.length;
    parts.push(fd); writeOff+=fd.length;
  }

  // New central directory
  var newCdOff=writeOff;
  for(var ei=0;ei<entries.length;ei++){
    var e=entries[ei];
    var cdEntry=new Uint8Array(src.slice(e.cdp,e.cdp+46+e.fnl+e.exl+e.cml));
    if(replacements[e.fn]){
      var r=replacements[e.fn];
      w32(cdEntry,16,r.crc); w32(cdEntry,20,r.cs); w32(cdEntry,24,r.us);
    }
    w32(cdEntry,42,offsets[ei]);
    parts.push(cdEntry); writeOff+=cdEntry.length;
  }

  // EOCD
  var newEocd=new Uint8Array(src.slice(eocd,eocd+22));
  var newCdSize=writeOff-newCdOff;
  w32(newEocd,12,newCdSize); w32(newEocd,16,newCdOff);
  parts.push(newEocd);

  // Concatenate
  var total=parts.reduce(function(s,p){return s+p.length;},0);
  var out=new Uint8Array(total), off=0;
  for(var pi=0;pi<parts.length;pi++){out.set(parts[pi],off);off+=parts[pi].length;}
  return out.buffer;
}

async function inflateRaw(data){
  var ds=new DecompressionStream("deflate-raw");
  var w=ds.writable.getWriter(),r=ds.readable.getReader();
  w.write(data); w.close();
  var chunks=[],total=0;
  while(true){var x=await r.read();if(x.done)break;chunks.push(x.value);total+=x.value.length;}
  var out=new Uint8Array(total),o=0;
  for(var c of chunks){out.set(c,o);o+=c.length;}
  return out;
}

async function deflateRaw(data){
  var cs=new CompressionStream("deflate-raw");
  var w=cs.writable.getWriter(),r=cs.readable.getReader();
  w.write(data); w.close();
  var chunks=[],total=0;
  while(true){var x=await r.read();if(x.done)break;chunks.push(x.value);total+=x.value.length;}
  var out=new Uint8Array(total),o=0;
  for(var c of chunks){out.set(c,o);o+=c.length;}
  return out;
}

function calcCrc32(data){
  var crc=0xFFFFFFFF,t=getCrcTable();
  for(var i=0;i<data.length;i++){crc=(crc>>>8)^t[(crc^data[i])&255];}
  return(crc^0xFFFFFFFF)>>>0;
}
var _crcT=null;
function getCrcTable(){
  if(_crcT) return _crcT;
  _crcT=new Uint32Array(256);
  for(var i=0;i<256;i++){var c=i;for(var j=0;j<8;j++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);_crcT[i]=c;}
  return _crcT;
}


async function genAgenda(){
  loading.agenda=true; re();
  try{
    var buf = await fetchTemplate(TEMPLATES.agenda);
    var teamStr = tr.filter(Boolean).join(", ") || F.con || "Yardi Team";
    var agTokens = {
      "{{CLIENT_NAME}}":    cl(),
      "{{CONSULTANT_NAME}}":teamStr,
      "{{BPR_FROM}}":       getBprFrom(),
      "{{BPR_UNTIL}}":      getBprUntil()
    };
    var rowsXml = buildAgendaRowsXml();
    var processed = await agendaWithRows(buf, agTokens, rowsXml);
    dlFile(processed,"BPR_Agenda_"+cl().replace(/\s+/g,"_")+".docx","application/vnd.openxmlformats-officedocument.wordprocessingml.document");
    done.add(2);
  }catch(e){alert("Error generating agenda: "+e.message);}
  loading.agenda=false; re();
}


async function agendaWithRows(arrayBuffer, tokens, rowsXml){
  function xe(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  var src = new Uint8Array(arrayBuffer);
  function r16(b,o){return b[o]|(b[o+1]<<8);}
  function r32(b,o){return((b[o]|(b[o+1]<<8)|(b[o+2]<<16)|(b[o+3]<<24))>>>0);}
  function w32(b,o,v){b[o]=v&255;b[o+1]=(v>>8)&255;b[o+2]=(v>>16)&255;b[o+3]=(v>>24)&255;}

  // Find EOCD
  var eocd=-1;
  for(var i=src.length-22;i>=0;i--){if(src[i]===0x50&&src[i+1]===0x4B&&src[i+2]===0x05&&src[i+3]===0x06){eocd=i;break;}}
  if(eocd<0) throw new Error("Invalid ZIP");
  var cdOff=r32(src,eocd+16), cdCnt=r16(src,eocd+10);
  var entries=[], pos=cdOff;
  for(var i=0;i<cdCnt;i++){
    if(r32(src,pos)!==0x02014B50) break;
    var cm=r16(src,pos+10),crc=r32(src,pos+16),cs=r32(src,pos+20),us=r32(src,pos+24);
    var fnl=r16(src,pos+28),exl=r16(src,pos+30),cml=r16(src,pos+32),lo=r32(src,pos+42);
    var fn=new TextDecoder().decode(src.slice(pos+46,pos+46+fnl));
    entries.push({fn:fn,cm:cm,crc:crc,cs:cs,us:us,lo:lo,fnl:fnl,exl:exl,cml:cml,cdp:pos});
    pos+=46+fnl+exl+cml;
  }
  var xmlTargets={"word/document.xml":1,"word/header1.xml":1,"word/footer1.xml":1,"word/header2.xml":1,"word/footer2.xml":1};
  var replacements={};
  for(var ei=0;ei<entries.length;ei++){
    var e=entries[ei];
    if(!xmlTargets[e.fn]) continue;
    var lhFnl=r16(src,e.lo+26),lhExl=r16(src,e.lo+28);
    var ds=e.lo+30+lhFnl+lhExl;
    var compData=src.slice(ds,ds+e.cs);
    var rawBytes=e.cm===8?await inflateRaw(compData):compData;
    var xml=new TextDecoder("utf-8").decode(rawBytes);
    // Replace header tokens
    for(var tok in tokens){
      if(tok==="{{AGENDA_ROWS}}") continue;
      xml=xml.split(tok).join(xe(tokens[tok]));
    }
    // Inject agenda rows - replace data rows keeping header row
    if(e.fn==="word/document.xml"){
      xml=xml.replace(/(<w:trPr>\s*<w:cantSplit[/]>\s*<w:tblHeader[/]>[\s\S]*?<[/]w:tr>)([\s\S]*)(<[/]w:tbl>)/,
        function(m,hdr,_old,close){return hdr+rowsXml+close;});
    }
    rawBytes=new TextEncoder().encode(xml);
    var recomp=await deflateRaw(rawBytes);
    var newCrc=calcCrc32(rawBytes);
    replacements[e.fn]={data:recomp,crc:newCrc,cs:recomp.length,us:rawBytes.length};
  }
  // Rebuild ZIP
  var parts=[],offsets=[],writeOff=0;
  for(var ei=0;ei<entries.length;ei++){
    var e=entries[ei];
    var lhFnl=r16(src,e.lo+26),lhExl=r16(src,e.lo+28);
    var ds=e.lo+30+lhFnl+lhExl;
    var lh=new Uint8Array(src.slice(e.lo,ds));
    var fd;
    offsets.push(writeOff);
    if(replacements[e.fn]){
      var r=replacements[e.fn];
      fd=r.data; w32(lh,14,r.crc); w32(lh,18,r.cs); w32(lh,22,r.us);
    } else { fd=src.slice(ds,ds+e.cs); }
    parts.push(lh); writeOff+=lh.length;
    parts.push(fd); writeOff+=fd.length;
  }
  var newCdOff=writeOff;
  for(var ei=0;ei<entries.length;ei++){
    var e=entries[ei];
    var cdE=new Uint8Array(src.slice(e.cdp,e.cdp+46+e.fnl+e.exl+e.cml));
    if(replacements[e.fn]){var r=replacements[e.fn];w32(cdE,16,r.crc);w32(cdE,20,r.cs);w32(cdE,24,r.us);}
    w32(cdE,42,offsets[ei]);
    parts.push(cdE); writeOff+=cdE.length;
  }
  var newEocd=new Uint8Array(src.slice(eocd,eocd+22));
  w32(newEocd,12,writeOff-newCdOff); w32(newEocd,16,newCdOff);
  parts.push(newEocd);
  var total=parts.reduce(function(s,p){return s+p.length;},0);
  var out=new Uint8Array(total),off=0;
  for(var pi=0;pi<parts.length;pi++){out.set(parts[pi],off);off+=parts[pi].length;}
  return out.buffer;
}

// ── Date helpers ──────────────────────────────────────────────────────────────
function fmtTime24to12(t){
  try{var p=t.split(":");var h=parseInt(p[0]),m=p[1]||"00",ap=h>=12?"PM":"AM";var h12=h>12?h-12:(h===0?12:h);return h12+":"+m+" "+ap;}catch(e){return t;}
}
function nextWorkDay(d){
  var r=new Date(d);
  while(r.getDay()===0||r.getDay()===6){r.setDate(r.getDate()+1);}
  return r;
}
function addWorkDays(startISO,n){
  var days=[],d=nextWorkDay(new Date(startISO));
  for(var i=0;i<n;i++){
    if(i>0){d.setDate(d.getDate()+1);d=nextWorkDay(d);}
    days.push(new Date(d));
  }
  return days;
}
function fmtDate(d){return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});}
function fmtDay(d){return d.toLocaleDateString("en-GB",{weekday:"long"});}
function getBprFrom(){
  var e=null;
  sm().forEach(function(m){var ms=moduleSessions[m.id];if(ms&&ms.startDate){var d=new Date(ms.startDate);if(!e||d<e)e=d;}});
  return e?fmtDate(e):"TBD";
}
function getBprUntil(){
  var l=null;
  sm().forEach(function(m){var ms=moduleSessions[m.id];if(ms&&ms.startDate&&ms.days){var days=addWorkDays(ms.startDate,parseInt(ms.days)||1);var last=days[days.length-1];if(!l||last>l)l=last;}});
  return l?fmtDate(l):"TBD";
}

// ── Build agenda table rows XML ───────────────────────────────────────────────
function buildAgendaRowsXml(){
  function xe(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
  var rPr='<w:rPr><w:rFonts w:asciiTheme="minorHAnsi" w:hAnsiTheme="minorHAnsi" w:cstheme="minorHAnsi"/><w:sz w:val="22"/><w:szCs w:val="22"/></w:rPr>';
  var rPrBold='<w:rPr><w:rFonts w:asciiTheme="minorHAnsi" w:hAnsiTheme="minorHAnsi" w:cstheme="minorHAnsi"/><w:b/><w:bCs/><w:sz w:val="22"/><w:szCs w:val="22"/><w:u w:val="single"/></w:rPr>';
  function pC(txt,rp){return'<w:p><w:pPr><w:spacing w:before="60" w:after="60"/><w:jc w:val="center"/><w:rPr><w:rFonts w:asciiTheme="minorHAnsi" w:hAnsiTheme="minorHAnsi" w:cstheme="minorHAnsi"/><w:sz w:val="22"/><w:szCs w:val="22"/></w:rPr></w:p><w:p><w:pPr><w:spacing w:before="60" w:after="60"/><w:jc w:val="center"/></w:pPr><w:r>'+rp+'<w:t xml:space="preserve">'+xe(txt)+'</w:t></w:r></w:p>';}
  function pL(txt,rp){return'<w:p><w:pPr><w:spacing w:before="60" w:after="60"/></w:pPr><w:r>'+rp+'<w:t xml:space="preserve">'+xe(txt)+'</w:t></w:r></w:p>';}
  function pLi(txt,numId){return'<w:p><w:pPr><w:pStyle w:val="ListParagraph"/><w:numPr><w:ilvl w:val="0"/><w:numId w:val="'+numId+'"/></w:numPr><w:spacing w:before="60" w:after="60"/><w:ind w:left="455"/><w:rPr><w:rFonts w:asciiTheme="minorHAnsi" w:hAnsiTheme="minorHAnsi"/><w:sz w:val="22"/><w:szCs w:val="22"/></w:rPr><w:r><w:rPr><w:rFonts w:asciiTheme="minorHAnsi" w:hAnsiTheme="minorHAnsi"/><w:sz w:val="22"/><w:szCs w:val="22"/></w:rPr><w:t>'+xe(txt)+'</w:t></w:r></w:p>';}
  function tc(w,inner){return'<w:tc><w:tcPr><w:tcW w:w="'+w+'" w:type="dxa"/></w:tcPr>'+inner+'</w:tc>';}

  var TOPICS={
    vc: {title:"Vendor Cafe",items:["Vendor Markets & Categories","Vendor Approval DOA & Workflows","Vendor Portal Configuration","Vendor Cafe Email Templates","EFT Format & Payment Methods","BPR & RFI Finalization"]},
    p2p:{title:"Procure to Pay",items:["Purchase Requisition & PO Process","DOA & Approval Workflows","GRN Process","Invoice Management","Payment Processing","Vendor Advances & Petty Cash","Service Contracts (AMC)","BPR & RFI Finalization"]},
    fa: {title:"Fixed Asset Manager",items:["Asset Groups & Types","Depreciation Methods & Conventions","Asset Creation Workflows","Asset Lifecycle Transactions","Asset Warranty & Barcode","BPR & RFI Finalization"]},
    wo: {title:"Work Orders",items:["Maintenance Business Models","Work Order Lifecycle","Team Structure & Roles","WO Categories, Priorities & SLA","WO Financials & Approvals","WO Mobile App","BPR & RFI Finalization"]},
    fm: {title:"Inspection & PPM",items:["Inspection Types & Templates","Inspection Creation & Scheduling","Inspection Execution (Mobile App)","PPM Process & Equipment Setup","Planned Maintenance Scheduling","BPR & RFI Finalization"]},
  };

  var xml="";
  var numId=50; // start at 50 to avoid conflicts with template numbering

  sm().forEach(function(m){
    var ms=moduleSessions[m.id]||{};
    var nDays=parseInt(ms.days)||1;
    var tf=ms.timeFrom?fmtTime24to12(ms.timeFrom):"08:00 AM";
    var tt=ms.timeTo?fmtTime24to12(ms.timeTo):"03:00 PM";
    var timeSlot=tf+" \u2013 "+tt;
    var atts=(ms.attendees||"").split("\n").map(function(a){return a.trim();}).filter(Boolean);
    var days=ms.startDate?addWorkDays(ms.startDate,nDays):[];
    var mod=TOPICS[m.id]||{title:m.name,items:[]};
    var thisNumId=numId++;
    var attNumId=numId++;

    // Build topics XML
    var topicsXml=pL(mod.title,rPrBold);
    mod.items.forEach(function(item){
      topicsXml+=pLi(item,thisNumId);
    });

    // Build attendees XML
    var attXml="";
    if(atts.length>0){
      atts.forEach(function(a){attXml+=pLi(a,attNumId);});
    } else {
      attXml=pL("To be confirmed",rPr);
    }

    if(days.length===0){
      // No dates — single row TBD
      xml+='<w:tr><w:trPr><w:cantSplit/></w:trPr>'
        +tc("1404",pC("TBD",rPr)+pC(m.name,rPr))
        +tc("1560",pC(timeSlot,rPr))
        +tc("5528",topicsXml)
        +tc("1985",attXml)
        +'</w:tr>';
    } else {
      days.forEach(function(day,di){
        // Topics and attendees only on first day row
        var tpXml=di===0?topicsXml:pL("(continued)",rPr);
        var aXml=di===0?attXml:pL("",rPr);
        xml+='<w:tr><w:trPr><w:cantSplit/></w:trPr>'
          +tc("1404",pC(fmtDate(day),rPr)+pC(fmtDay(day),rPr))
          +tc("1560",pC(timeSlot,rPr))
          +tc("5528",tpXml)
          +tc("1985",aXml)
          +'</w:tr>';
      });
    }
  });

  return xml;
}


// ── Generate RFI from real template ──────────────────────────────────────────
async function genRfi(){
  loading.rfi=true; re();
  try{
    var buf = await fetchTemplate(TEMPLATES.rfi);
    var wb = XLSX.read(new Uint8Array(buf), {type:"array"});

    // Get RFI Index sheet
    var ws = wb.Sheets["RFI Index"];
    if(!ws) throw new Error("RFI Index sheet not found in template");

    // Replace XX in A1 with client name
    if(ws["A1"]) ws["A1"].v = cl();
    if(ws["A1"]) ws["A1"].w = cl();

    // Filter rows based on selected modules
    var rfiMods = new Set();
    sm().forEach(function(m){(M2R[m.id]||[]).forEach(function(n){rfiMods.add(n);});});

    // Find data rows and hide/show based on module selection
    // Get the range
    var range = XLSX.utils.decode_range(ws["!ref"]||"A1:P60");

    // Mark rows not in scope (set empty) — keep header rows (1-3)
    for(var r=3; r<=range.e.r; r++){
      var modCell = ws[XLSX.utils.encode_cell({r:r,c:1})]; // Column B = Yardi Module
      if(modCell && modCell.v){
        var modVal = String(modCell.v);
        if(!rfiMods.has(modVal)){
          // Mark row as not applicable by greying out
          // We can't hide rows in browser XLSX, so we add a note
          var remarkCell = XLSX.utils.encode_cell({r:r,c:11}); // Remarks column
          if(!ws[remarkCell]) ws[remarkCell]={t:"s",v:""};
          // Leave row but it will just have the data
        }
      }
    }

    // Update target date column for all data rows
    for(var r=3; r<=range.e.r; r++){
      var modCell = ws[XLSX.utils.encode_cell({r:r,c:1})];
      if(modCell && modCell.v && F.dl){
        var tgtCell = XLSX.utils.encode_cell({r:r,c:8}); // Target Date column
        ws[tgtCell] = {t:"s", v:F.dl};
      }
      // Update Project Team Member column
      if(modCell && modCell.v && F.con){
        var pmCell = XLSX.utils.encode_cell({r:r,c:6}); // Project Team Member
        if(!ws[pmCell] || !ws[pmCell].v){
          ws[pmCell] = {t:"s", v:F.con};
        }
      }
    }

    var wbOut = XLSX.write(wb, {type:"array", bookType:"xlsx"});
    var safe = cl().replace(/\s+/g,"_");
    dlFile(wbOut, "RFI_"+safe+".xlsx", "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet");
    done.add(5);
  }catch(e){alert("Error: "+e.message);}
  loading.rfi=false; re();
}

  return'<div><div class="pt">Cloud environment setup email</div><div class="ps">Downloads a formatted Word document using your real template structure.</div>'
    +'<div class="card"><div class="ct">Recipients</div><div class="g2">'+fl("To (cloud team)","to","Nereah.Abwao@Yardi.Com")+fl("CC (project team)","cc","Rajat.Agarwal@Yardi.Com, ...")+fl("Special notes","cn","e.g. DBs to be copy of AIM GOLD DB.","textarea",{full:true})+'</div></div>'
    +ldBtn("email","Email .docx","genEmail()")
    +'<div class="brow"><button class="btn bs" onclick="go(1)">← Back</button><button class="btn bp" onclick="go(3)">Continue →</button></div></div>';
}

function p3(){
  var modH=sm().map(function(m){
    var ms=moduleSessions[m.id]||{days:"1",timeFrom:"08:00",timeTo:"15:00",startDate:"",attendees:""};
    var mid=m.id;
    return'<div class="card" style="margin-bottom:10px">'
      +'<div class="ct" style="color:#185FA5">'+esc(m.name)+'</div>'
      +'<div class="g2">'
      +'<div><label class="lbl">Session start date *</label>'
      +'<input type="date" value="'+esc(ms.startDate||"")+'" oninput="setMS(this.dataset.mid,\'startDate\',this.value)" data-mid="'+mid+'"></div>'
      +'<div><label class="lbl">Number of days</label>'
      +'<input type="number" min="1" max="10" value="'+esc(ms.days||"1")+'" oninput="setMS(this.dataset.mid,\'days\',this.value)" data-mid="'+mid+'"></div>'
      +'<div><label class="lbl">Time from</label>'
      +'<input type="time" value="'+esc(ms.timeFrom||"08:00")+'" oninput="setMS(this.dataset.mid,\'timeFrom\',this.value)" data-mid="'+mid+'"></div>'
      +'<div><label class="lbl">Time to</label>'
      +'<input type="time" value="'+esc(ms.timeTo||"15:00")+'" oninput="setMS(this.dataset.mid,\'timeTo\',this.value)" data-mid="'+mid+'"></div>'
      +'<div class="full"><label class="lbl">Suggested attendees (one per line)</label>'
      +'<textarea rows="3" oninput="setMS(this.dataset.mid,\'attendees\',this.value)" data-mid="'+mid+'" placeholder="e.g. Procurement Manager&#10;Finance Team&#10;IT">'+esc(ms.attendees||"")+'</textarea>'
      +'</div></div></div>';
  }).join("");
  var teamH=tr.map(function(r,i){return'<div class="tr"><input value="'+esc(r)+'" oninput="tr['+i+']=this.value" placeholder="Name — Role"><button class="rm" onclick="rt('+i+')">✕</button></div>';}).join("");
  return'<div><div class="pt">BPR session agenda</div>'
    +'<div class="ps">Set dates, times, and attendees per module. The agenda is generated automatically.</div>'
    +'<div class="card"><div class="ct">Yardi team members</div>'+teamH+'<button class="al" onclick="at()">+ Add member</button></div>'
    +'<div class="info">📅 Configure each module below. Days are auto-calculated and weekends are skipped.</div>'
    +modH
    +ldBtn("agenda","Agenda .docx","genAgenda()")
    +'<div class="brow"><button class="btn bs" onclick="go(2)">← Back</button><button class="btn bp" onclick="go(4)">Continue →</button></div></div>';
}

function p4(){
  var tabs=sm().filter(function(m){return TEMPLATES[m.id];});
  var tH=tabs.map(function(m){return'<button class="tb'+(bt===m.id?" on":"")+'" onclick="sbt(\''+m.id+'\')">'+TN[m.id]+'</button>';}).join("");
  var cur=tabs.find(function(m){return m.id===bt;});
  var ms=moduleSessions[bt]||{};
  var body=cur
    ?'<div class="card"><div class="ct">'+TN[bt]+' BPR <span style="font-size:10px;color:#16a34a;font-weight:400;background:#dcfce7;padding:2px 7px;border-radius:20px;margin-left:4px">📄 from your real template</span></div>'
     +'<div class="g2">'
     +'<div><label class="lbl">Session date</label><input type="date" value="'+esc(ms.startDate||"")+'" oninput="setMS(this.dataset.mid,\'startDate\',this.value)" data-mid="'+bt+'"></div>'
     +'<div><label class="lbl">Workshop owner (consultant)</label><input type="text" value="'+esc(ms.workshopOwner||F.con||"")+'" oninput="setMS(this.dataset.mid,\'workshopOwner\',this.value)" data-mid="'+bt+'" placeholder="e.g. Anas Takala"></div>'
     +'</div><div style="margin-top:10px">'
     +ldBtn("bpr_"+bt,TN[bt]+" .docx","genBpr('"+bt+"')")+"</div></div>"
    :'<div class="info">No modules selected. Go back to Step 2.</div>';
  return'<div><div class="pt">BPR documents</div>'
    +'<div class="ps">Each document is your real uploaded template with client data filled in — not generated from scratch.</div>'
    +'<div class="tbr">'+tH+'</div>'+body
    +'<div class="brow"><button class="btn bs" onclick="go(3)">← Back</button><button class="btn bp" onclick="go(5)">Continue →</button></div></div>';
}

function p5(){
  return'<div><div class="pt">RFI collection sheet</div><div class="ps">Your real RFI template fetched from GitHub, client name filled in, filtered to selected modules.</div>'
    +'<div class="card"><div class="ct">Configuration</div><div class="g2">'+fl("Project focal point","fo","e.g. John Smith")+fl("Target completion date","dl","","date")+fl("Instructions for client","rn","e.g. Please fill Critical items before first BPR session.","textarea",{full:true})+'</div></div>'
    +ldBtn("rfi","RFI .xlsx","genRfi()")
    +'<div class="brow"><button class="btn bs" onclick="go(4)">← Back</button><button class="btn bp" onclick="go(6)">Continue →</button></div></div>';
}

function p6(){
  var ds=[
    {key:"email",lb:"Cloud Email .docx",step:2,fn:"genEmail()"},
    {key:"agenda",lb:"BPR Agenda .docx",step:3,fn:"genAgenda()"},
  ];
  sm().filter(function(m){return TEMPLATES[m.id];}).forEach(function(m){ds.push({key:"bpr_"+m.id,lb:TN[m.id]+" BPR .docx",step:4,fn:"genBpr('"+m.id+"')"});});
  ds.push({key:"rfi",lb:"RFI Collection .xlsx",step:5,fn:"genRfi()"});
  var stepMap={};ds.forEach(function(d){stepMap[d.key]=d.step;});
  var rdy=ds.filter(function(d){return done.has(d.step);}).length;
  var stats='<div class="rg">'+[["Client",cl()],["Modules",sm().length+" selected"],["Downloaded",rdy+" / "+ds.length]].map(function(p){return'<div class="sc"><div class="sl">'+p[0]+'</div><div class="sv">'+p[1]+'</div></div>';}).join("")+'</div>';
  var cards=ds.map(function(d){var ok=done.has(d.step),ld=loading[d.key];return'<div class="dc"><div class="dh"><span class="dn">'+d.lb+'</span><span class="bk '+(ok?"bok":"bpn")+'">'+(ok?"✓ Downloaded":"Pending")+'</span></div><div class="dd">'+(ok?"Saved to your Downloads folder.":"Not yet generated.")+'</div><button class="btn '+(ok?"bg":"bp")+'" style="font-size:11px;padding:5px 12px" '+(ld?"disabled":"")+' onclick="'+d.fn+'">'+(ld?'<span class="spin"></span>':(ok?"↓ Re-download":"↓ Download"))+'</button></div>';}).join("");
  return'<div><div class="pt">Review &amp; download</div><div class="ps">All files for '+esc(cl())+'. Each downloads your real template with client data filled in.</div>'+stats+'<div class="dg">'+cards+'</div><div class="brow"><button class="btn bs" onclick="go(5)">← Back</button></div></div>';
}

re();
</script>
